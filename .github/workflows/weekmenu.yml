name: Weekmenu

on:
  schedule:
    - cron: "0 2 * * 1"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekmenu:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        env:
          LOCATION: Geel
          DISCORD_WEBHOOK_URLS: ${{ secrets.DISCORD_WEBHOOK_URLS }}
        run: |
          python script.py

      - name: Commit history files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add history/

          git diff --cached --quiet || git commit -m "Update weekmenu history"

          git push